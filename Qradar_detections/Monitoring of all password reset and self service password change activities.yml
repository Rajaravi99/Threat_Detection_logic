Rule Name : Office365 - Monitoring of all password reset and self service password change activities
Rule Description : 
Mitre Mapping : 
  - Tactic: 
  - Technique: 
  - Sub-technique: 
  - ID: 
logic : SELECT QIDNAME(qid), Username, Source IP, Destination IP, Magnitude from events
  WHERE ((Event Name ILIKE '%Login Error Password Reset Registration Required Interrupt%' or Event Name ILIKE '%Update Password Profile - Success%' 
  or Event Name ILIKE '%Change user password-success%') AND magnitude >= 7)