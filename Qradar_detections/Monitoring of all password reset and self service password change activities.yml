Rule Name : Office365 - Monitoring of all password reset and self service password change activities
Rule Description : 
Mitre Mapping : 
  - Tactic: 
  - Technique: 
  - Sub-technique: 
  - ID: 
logic : APPLY Office365 - Monitoring of all password reset and self service password change activities on events which are detected by the LOCAL system
        AND when the event(s) were detected by one or more of Office 365
        AND when the event matches this AQL query

  WHERE ((EventName ILIKE '%Login Error Password Reset Registration Required Interrupt%' or EventName ILIKE '%Update Password Profile - Success%' 
  or EventName ILIKE '%Change user password-success%') AND magnitude >= 7)