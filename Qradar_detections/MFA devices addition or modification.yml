logic : SELECT QIDNAME(qid), Username, Source IP, Destination IP, Magnitude from events
  WHERE ((Event Name ILIKE '%Update Group - Fail%' or Event Name ILIKE '%Update user-failure%' or Event Name ILIKE 'Device No Longer Managed%' or 
  Event Name ILIKE '%Device is Disabled - Login Failure%' or Event Name ILIKE '%Add Registered Owner To Device Failure%' or Event Name ILIKE '%Add Registered Users To Device Failure%'
  or Event Name ILIKE '%Device Update Failed%' or Event Name '%Add Registered Users To Device Failure%') AND magnitude >= 7)


  SELECT QIDNAME(qid), Username, Source IP, Destination IP, Magnitude from events
  WHERE ((Event Name ILIKE '%Login Error Password Reset Registration Required Interrupt%' or Event Name ILIKE '%Update Password Profile - Success%' 
  or Event Name ILIKE '%Change user password-success%') AND magnitude >= 7)