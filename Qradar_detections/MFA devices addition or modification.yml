Rule Name : Office365 - MFA device addition or modification detected
Rule Description : 
Mitre Mapping : 
  - Tactic: 
  - Technique: 
  - Sub-technique: 
  - ID: 
logic : APPLY Office365 - MFA device addition or modification detected on events which are detected by the LOCAL system
        AND when the event(s) were detected by one or more of Office 365
        AND when the event matches this AQL query

  WHERE ((EventName ILIKE '%Update Group - Fail%' or EventName ILIKE '%Update user-failure%' or EventName ILIKE 'Device No Longer Managed%' or 
  EventName ILIKE '%Device is Disabled - Login Failure%' or EventName ILIKE '%Add Registered Owner To Device Failure%' or EventName ILIKE '%Add Registered Users To Device Failure%'
  or EventName ILIKE '%Device Update Failed%' or EventName '%Add Registered Users To Device Failure%') AND magnitude >= 7)