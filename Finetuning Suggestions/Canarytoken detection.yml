Current rule logic: APPLY DNS request for Canary Domains on events which are detected by the LOCAL system
                    AND when the event(s) were detected by one or more of Microsoft Windows Security Event Log
                    AND when any of Qname (custom) are contained in any of DNS Canary Domains

