SELECT event category, eventid, username, object, filename, sourceip, DestinationIP, Domainname, Objectname, ProcessName,serviceFileName from events
WHERE (eventcatogary ILIKE '%dns query%' AND Domainname IN ('%canarytokens%','%canary.tools%','%.dnslog.canarytokens.com%'))
OR (eventid IN ('4663','4660') AND Objectname IN ('*\canary*','*\desktop.ini'))
OR (eventid IN ('10','11') AND ProcessName IN ('explorer.exe','cmd.exe','powershell.exe'))
OR (eventid IN ('7045') AND serviceFileName CONTAINS ('explorer','cmd','powershell'))





SELECT
  sourceip AS Host,
  COUNT(*) AS EventCount,
  MIN(starttime) AS FirstSeen,
  MAX(starttime) AS LastSeen
FROM events
WHERE
(
  DOMAINNAME ILIKE '%canarytokens%'
  OR EVENTID IN (4688, 4663, 4660, 11, 4104, 7045)
)
GROUP BY sourceip
HAVING EventCount >= 2
LAST 30 MINUTES

Canary domains - canarytokens.net, canarytokens.org, canarytokens.com