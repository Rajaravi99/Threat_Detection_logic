Rule Name: UC-DE-926 - Windows - Possible UAC Bypass - A Scheduled Task Has Been Configured to Run With Highest Privileges
Logic : APPLY UC-DE-926 - Windows - Possible UAC Bypass - A Scheduled Task Has Been Configured to Run With Highest Privileges on events which are detected by the LOCAL system
        AND when the event(s) were detected by one or more of Microsoft Windows Security Event Log
        AND when the event QID is one of the following (5000872) Success Audit: A scheduled task was created
        AND NOT when any of Task Name (custom), TaskName (custom), Command (custom) are contained in any of Legitimate Task Name - AlphaNumeric (Ignore Case)
        AND NOT when any of Task Name (custom), TaskName (custom), Command (custom) are contained in any of Legitimate Task Name 1 - AlphaNumeric
        AND NOT when the event matches Command (custom) is any of C:\Program Files (x86)\Microsoft\EdgeUpdate\MicrosoftEdgeUpdate.exe, Command (custom) is any of C:\Windows\CCM\ccmeval.exe, Command (custom) is any of [C:\Windows\system32\MRT.exe or %windir%\system32\wermgr.exe or C:\Program Files (x86)\Google\Update\GoogleUpdate.exe], Task Name (custom) is any of Microsoft\Configuration Manager\Configuration Manager Health Evaluation, Task Name (custom) is any of Microsoft\Windows\Data Integrity Scan\Data Integrity Scan, Command (custom) contains all of C:\Program Files (x86)\Google\Update\GoogleUpdate.exe
        AND when the event matches "Run Level" = 'HighestAvailable' AQL filter query
        AND NOT when the event matches Log Source is PVDCWCAP002@WinOS, Username is any of SA_AM-SMAcc_Prod
        AND NOT when the event matches Log Source is PVDCWADF004 @ WinOS, Username is any of hishadm, TaskName (custom) is any of ADFS_new_AUR_BOT
        AND NOT when the event matches QID Number is 5,000,876, Username is any of SA_Pam_AD_Discovery, Log Source is Pvdcwinmgmt001@WinOS
        AND NOT when the event matches Log Source is PVDCWASX159@WinOS, Username is any of SA_Pam_AD_Discovery, Task Name (custom) is any of [WPS Batch jobs\Clear Local Log files or WPS Batch jobs\NLP Batch or WPS Batch jobs\NLP - Bureau Parsing or WPS Batch jobs\Copy SAS Inputs from pvdcwinrpt003]