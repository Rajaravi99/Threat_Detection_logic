    select last(message) as baseEvent, "{\"description\": \"Detects indicators associated with Darkbit ransomware campaigns targeting the edtech sector. This detection rule focuses on identifying specific domains, IP addresses, hashes, and URLs that are known to be utilized by Darkbit ransomware operators. By monitoring for these indicators within application logs, cybersecurity analysts can potentially identify and mitigate ransomware threats early in the attack lifecycle, preventing data encryption and extortion activities commonly associated with such attacks.\\n\\nDarkbit ransomware campaigns leverage a variety of TTPs to infiltrate and exploit educational technology systems. The adversaries often use phishing emails containing malicious links or attachments that lead to domains like pragmaticus.ru or server-avira.com. These domains are part of their command-and-control infrastructure, facilitating communication between the compromised system and the attackers. Additionally, IP addresses such as 188.92.255.96 and hashes like 77a369e5e49e7e62d8eef2c00cd02950 correspond to known malicious entities or files deployed during the attack. URLs like http://getmyfile365.xyz/app/handala.zip serve as download points for malicious payloads. Detecting these indicators helps in quickly identifying and responding to ransomware threats before they can cause significant damage.\\n\", \"investigation\": \"- Identify the specific indicator (domain, IP, hash, or URL) that triggered the alert and gather related log entries from SIEM and EDR systems.\\n- Determine if there are any other occurrences of the same indicator across different hosts or over a period of time to identify potential lateral movement or widespread compromise.\\n- Check for any recent phishing attempts or suspicious emails that may have delivered the initial payload linked to the identified indicator.\\n- Investigate any processes or connections associated with the flagged indicator to identify malicious activities or communications with known command-and-control servers.\\n- Analyze any file executions or downloads from URLs specified in the rule to understand the nature of the payload and its potential impact on the system.\\n- Review user activity logs around the time of detection to identify any unauthorized access or actions taken by compromised accounts.\\n- Cross-reference detected indicators with threat intelligence sources to verify if they are part of a known Darkbit ransomware campaign.\\n- Assess the integrity of critical files and systems potentially affected by the ransomware to determine if any data has been encrypted or tampered with.\\n- Consider implementing additional monitoring or blocking measures for identified indicators to prevent further intrusion attempts.\\n\", \"references\": [\"https://git.icd.capgemini.com/signatures/global-icd-detection-library/-/blob/main/active/network/firewall/darkbeat_ransomeware_signature_detection\", \"https://www.anomali.com/blog/israel-in-focus-iran-retaliatory-posture\", \"https://www.splunk.com/en_us/blog/security/handalas-wiper-threat-analysis-and-detections.html\"], \"mitre_attack\": {\"tactic\": [\"Command and Control\", \"Initial Access\", \"Exfiltration\", \"Resource Development\", \"Execution\", \"Impact\"], \"tactic_id\": [\"TA0011\", \"TA0001\", \"TA0010\", \"TA0042\", \"TA0002\", \"TA0040\"], \"technique\": [\"Application Layer Protocol\", \"Phishing\", \"Exfiltration Over Web Service\", \"Acquire Infrastructure\", \"User Execution\", \"Data Encrypted for Impact\", \"Inhibit System Recovery\"], \"technique_id\": [\"T1071\", \"T1566\", \"T1567\", \"T1583\", \"T1204\", \"T1486\", \"T1490\"], \"sub_technique\": [\"Application Layer Protocol: Web Protocols\", \"Phishing: Spearphishing Link\", \"Exfiltration Over Web Service: Exfiltration to Cloud Storage\", \"Acquire Infrastructure: Domains\"], \"sub_technique_id\": [\"T1071.001\", \"T1566.002\", \"T1567.002\", \"T1583.001\"]}}" as meta, "SecOpsDarkbitransomwaresignaturesdetectionacrossalledtechsector" as AlertName, lu("SecOpsAlertDescription", "alertType", AlertName) as alertType, lu("SecOpsAlertDescription", "alertMitreTactics", AlertName) as alertMitreTactics, lu("SecOpsAlertDescription", "alertMitreTechniques", AlertName) as alertMitreTechniques, lu("SecOpsAlertDescription", "alertPriority", AlertName) as alertPriority, "695aac95-ef91-4422-90fa-cf134c7f4155" as detection_id